name: impostor-e2e

services:
  app:
    image: ${APP_IMAGE}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=
      # Relaxed rate limits for E2E test runs (many games created from one IP)
      - RATE_LIMIT_CREATE_MAX=100
      - RATE_LIMIT_CREATE_WINDOW_SECS=60
      - RATE_LIMIT_GLOBAL_MAX=1000
      - RATE_LIMIT_GLOBAL_WINDOW_SECS=10
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    networks:
      - game-net

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - game-net

networks:
  game-net:
